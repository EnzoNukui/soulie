<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/contato.css">
    <script src="../js/main.js" type="module" defer></script>
    <title>Soulie - Entre em Contato</title>
</head>

<body>

    <header class="header">
        <div class="logo">
            <h1>Soulie</h1>
        </div>

        <button class="menu-toggle" aria-label="Abrir menu de navegação" aria-expanded="false">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>


        <nav class="navbar" role="navigation" aria-label="Menu principal">
            <ul class="nav-list">
                <li><a href="../index.html">Home</a></li>
                <li><a href="./integrantes.html">Integrantes</a></li>
                <li><a href="./sobre.html">Sobre</a></li>
                <li><a href="./contato.html" class="active">Contato</a></li>
                <li><a href="./faq.html">FAQ</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="contact-hero" aria-labelledby="title-contact">
            <div class="section-title">
                <h2 id="title-contact">Entre em Contato</h2>
            </div>
            <p class="contact-subtitle">
                Tem alguma dúvida sobre a Soulie, sugestões de gamificação ou quer entender melhor nossa solução de
                retenção?
                Envie uma mensagem para a nossa equipe!
            </p>
        </section>

        <img src="../imagens/avatar/imagem_soulie.png" alt="Mascote Soulie" class="avatar-hero">

        <section class="contact-container">

            <form action="#" method="POST" class="contact-form" aria-label="Formulário de envio de mensagem">

                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required aria-required="true"
                        placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required aria-required="true"
                        placeholder="exemplo@email.com">
                </div>

                <div class="form-group">
                    <label for="assunto">Assunto Principal</label>
                    <select id="assunto" name="assunto" required aria-required="true">
                        <option value="" disabled selected>Selecione o motivo do contato</option>
                        <option value="duvida">Dúvidas sobre o Avatar</option>
                        <option value="sugestao">Sugestão de Funcionalidade</option>
                        <option value="feedback">Feedback do Projeto</option>
                        <option value="outros">Outros Assuntos</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensagem">Sua Mensagem</label>
                    <textarea id="mensagem" name="mensagem" rows="5" required aria-required="true"
                        placeholder="Escreva detalhadamente sua mensagem aqui..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit" aria-label="Enviar dados do formulário de contato">
                        Enviar Mensagem
                    </button>
                </div>

            </form>

        </section>

    </main>

    <footer class="footer">
        <p>© 2026 Soulie - Todos os direitos reservados.</p>
    </footer>

</body>

</html>
